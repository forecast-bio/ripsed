name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly long fuzz run (Mondays 06:00 UTC); regular pushes get a
    # short smoke run of the same targets.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

      - name: Completions and man page generate cleanly
        run: cargo run -p xtask -- gen-completions

  msrv:
    name: MSRV (1.93)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.93
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/audit@v1

  miri:
    name: Miri
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Miri (ripsed-core only)
        run: cargo +nightly miri test -p ripsed-core
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"

  semver:
    name: semver-checks (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [ripsed-core, ripsed-fs, ripsed-json, ripsed]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: semver

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      # Baseline is the highest version published on crates.io (the
      # tool's default), so this answers the pre-publish question that
      # matters in a direct-push workflow: does the tree break the
      # published API beyond what the declared version bump allows?
      # (The old form diffed against origin/main, which on a push TO
      # main compares the tree with itself — it was PR-gated and
      # therefore permanently skipped here.)
      - name: Run semver checks
        run: cargo semver-checks check-release -p ${{ matrix.crate }}

  fuzz:
    name: Fuzz smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_regex_input, fuzz_engine, fuzz_json_request, fuzz_autodetect]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: fuzz
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzzer
        # Short smoke on pushes/PRs; the weekly cron gets 10 minutes.
        run: |
          DURATION=60
          if [ "${{ github.event_name }}" = "schedule" ]; then DURATION=600; fi
          cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=$DURATION
        working-directory: .

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only | tee coverage-summary.txt

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            lcov.info
            coverage-summary.txt
